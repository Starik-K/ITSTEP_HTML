<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jidncwjibncwiucnw</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
}

body {
    background: #f5f5f5;
    padding: 20px;
}

.article {
    background: #0d4d4b;
    color: white;
    padding: 40px;
    max-width: 900px;
}

.breadcrumbs {
    color: #b5d1cf;
    margin-bottom: 20px;
}

.title {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 30px;
}

.info {
    display: flex;
    align-items: center;
    gap: 30px;
}

.avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #ddd;
    overflow: hidden;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.meta {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
}

.meta div {
    font-size: 14px;
}

.meta span {
    display: block;
    color: #9bc7c4;
    font-size: 12px;
}

/* 📱 Адаптив */
@media (max-width: 600px) {
    .article {
        padding: 20px;
    }

    .title {
        font-size: 24px;
    }

    .info {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
    }

    .meta {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>

<body>

<div class="article">
    
    <div class="breadcrumbs">
        Home / Articles /
    </div>

    <div class="title">
        The Difference Between Responsive and Adaptive Design
    </div>

    <div class="info">
        
        <div class="avatar">
<img src="https://cdn-icons-png.flaticon.com/512/4794/4794936.png">
        </div>

        <div class="meta">
            <div>
                <span>Author</span>
                Geoff Graham
            </div>

            <div>
                <span>49 Comments</span>
                Go to comments
            </div>

            <div>
                <span>Published</span>
                Nov 11, 2018
            </div>

            <div>
                <span>Updated</span>
                Nov 17, 2018
            </div>
        </div>

    </div>

</div>

</body>
</html>
