<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dzdzdzzdzdzdzd</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

body {
    background: #f2f2f2;
    padding: 20px;
}

.upload-box {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border: 2px solid #ddd;
    padding: 15px;
    display: flex;
    gap: 15px;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}

.image-block {
    width: 180px;
    height: 100px;
    background: #d9d9d9;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.image-block img {
    width: 70px;
    height: 70px;
    object-fit: contain;
}

.info-block {
    flex: 1;
}

.progress-row {
    display: flex;
    align-items: center;
    border: 1px solid #b8bfd6;
    height: 26px;
    margin-bottom: 10px;
    background: #f8f8f8;
    overflow: hidden;
}

.progress-fill {
    width: 40%;
    background: #d7dcec;
    height: 100%;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 12px;
    color: #333;
    flex-shrink: 0;
}

.progress-text {
    flex: 1;
    text-align: right;
    padding-right: 10px;
    font-size: 12px;
    color: #555;
}

.video-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
}

.video-text {
    font-size: 13px;
    color: #555;
}

.button-block {
    width: 120px;
    flex-shrink: 0;
}

.button-block button {
    width: 100%;
    padding: 10px;
    background: #5d6fae;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.button-block button:hover {
    background: #4b5d96;
}

@media (max-width: 600px) {
    .upload-box {
        flex-direction: column;
        align-items: stretch;
    }

    .image-block,
    .button-block {
        width: 100%;
    }

    .image-block {
        height: 140px;
    }

    .image-block img {
        width: 90px;
        height: 90px;
    }

    .video-title {
        font-size: 20px;
    }
}
</style>
</head>
<body>

<div class="upload-box">

    <div class="image-block">
        <img src="https://static.vecteezy.com/system/resources/previews/010/754/321/original/loading-icon-logo-design-template-illustration-free-vector.jpg" alt="loadin">
    </div>

    <div class="info-block">
        <div class="progress-row">
            <div class="progress-fill">UPLOADING 40%</div>
            <div class="progress-text">About 23 minutes remaining</div>
        </div>

        <div class="video-title">Title of video</div>
        <div class="video-text">
            Your video is still loading
        </div>
    </div>

    <div class="button-block">
        <button>DONE</button>
    </div>

</div>

</body>
</html>
