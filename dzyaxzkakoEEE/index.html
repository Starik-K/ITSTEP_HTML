<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>магаз</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Наші товари</h1>

    <div class="products">
      <div class="product-card">
        <img src="https://s.ek.ua/jpg_zoom1/2960394.jpg" alt="Смартфон">
        <h3>Смартфон</h3>
        <p class="price">$499</p>

        <div class="actions">
          <button class="btn btn-buy">Купити</button>
          <button class="btn btn-info">Інфо</button>
          <button class="btn btn-cancel">Скасувати</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://content1.rozetka.com.ua/goods/images/big_tile/655089306.jpg" alt="Ноутбук">
        <h3>Ноутбук</h3>
        <p class="price">$999</p>

        <div class="actions">
          <button class="btn btn-buy">Купити</button>
          <button class="btn btn-info">Інфо</button>
          <button class="btn btn-cancel">Скасувати</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://c.428.ua/img/4636646/220/220/marshall_major_v_brown_1006834~1657~1940.jpg" alt="Навушники">
        <h3>Навушники</h3>
        <p class="price">$199</p>

        <div class="actions">
          <button class="btn btn-buy">Купити</button>
          <button class="btn btn-info">Інфо</button>
          <button class="btn btn-cancel">Скасувати</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
