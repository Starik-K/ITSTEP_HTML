<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Таблиця</title>

<style>

body{
    margin:0;
    font-family:Arial;
}
div{
    width:600px;
    height:300px;
    overflow:auto;
    margin:40px auto;
    border:1px solid #ccc;
}

table{
    border-collapse:collapse;
    min-width:900px;
}

th, td{
    padding:12px;
    text-align:center;
}

thead th{
    background:#b9d3df;
    position:sticky;
    top:0;
}

th:first-child,
td:first-child{
    position:sticky;
    left:0;
    background:#b9d3df;
    font-weight:bold;
}

tbody tr:nth-child(even){
    background:#eeeeee;
}

tbody tr:nth-child(odd){
    background:#dddddd;
}

</style>
</head>
